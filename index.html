<!DOCTYPE html>
<html>
<head>
  <title>ESP8266 Status</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>ESP8266 Status</h1>
<h2 id="status">Checking...</h2>

<script>
const SUPABASE_URL = "https://bjmokvjpitviifjbnlvs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbW9rdmpwaXR2aWlmamJubHZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzkzMTEsImV4cCI6MjA4OTcxNTMxMX0.yEp_qZzGTArPrc03Om7_LL0jUiTDckUiaWZyxj047Ng";

const statusText = document.getElementById("status");

async function checkStatus() {
  try {
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/status?select=last_seen&order=id.desc&limit=1`,
      {
        method: "GET",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json"
        }
      }
    );

    // 🔥 Handle HTTP errors properly
    if (!response.ok) {
      statusText.innerHTML = "❌ ERROR " + response.status;
      console.error("HTTP Error:", response.status);
      return;
    }

    const data = await response.json();

    if (!data || data.length === 0) {
      statusText.innerHTML = "⚠️ NO DATA";
      return;
    }

    const lastUpdate = data[0].last_seen;
    const now = Math.floor(Date.now() / 1000);

    if (now - lastUpdate < 10) {
      statusText.innerHTML = "🟢 ONLINE";
    } else {
      statusText.innerHTML = "🔴 OFFLINE";
    }

  } catch (error) {
    statusText.innerHTML = "❌ FETCH ERROR";
    console.error(error);
  }
}

// Run every 3 seconds
setInterval(checkStatus, 3000);
checkStatus();
</script>

</body>
</html>
