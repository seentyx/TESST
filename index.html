<!DOCTYPE html>
<html>
<head>
  <title>ESP8266 Health Monitor</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>Health Monitor</h1>

<h2 id="status">Checking...</h2>
<p>BPM: <span id="bpm">--</span></p>
<p>Body Temp: <span id="body">--</span></p>
<p>Air Temp: <span id="air">--</span></p>
<p>Humidity: <span id="hum">--</span></p>

<script>
const SUPABASE_URL = "https://bjmokvjpitviifjbnlvs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbW9rdmpwaXR2aWlmamJubHZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzkzMTEsImV4cCI6MjA4OTcxNTMxMX0.yEp_qZzGTArPrc03Om7_LL0jUiTDckUiaWZyxj047Ng";

async function fetchData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/status?select=*&order=id.desc&limit=1`,
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      }
    );

    if (!res.ok) {
      document.getElementById("status").innerHTML = "❌ ERROR";
      return;
    }

    const data = await res.json();

    if (data.length === 0) {
      document.getElementById("status").innerHTML = "⚠️ NO DATA";
      return;
    }

    const d = data[0];

    // Show values
    document.getElementById("bpm").innerText = d.bpm;
    document.getElementById("body").innerText = d.body_temp + " °C";
    document.getElementById("air").innerText = d.air_temp + " °C";
    document.getElementById("hum").innerText = d.humidity + " %";

    // Online check
    const now = Math.floor(Date.now() / 1000);
    if (now - d.last_seen < 10) {
      document.getElementById("status").innerHTML = "🟢 ONLINE";
    } else {
      document.getElementById("status").innerHTML = "🔴 OFFLINE";
    }

  } catch (err) {
    document.getElementById("status").innerHTML = "❌ FETCH ERROR";
  }
}

// refresh every 3 sec
setInterval(fetchData, 3000);
fetchData();
</script>

</body>
</html>
