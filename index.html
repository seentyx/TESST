<!DOCTYPE html>
<html>
<head>
  <title>ESP8266 Status</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>ESP8266 Status</h1>
<h2 id="status">Checking...</h2>
<!-- Firebase core -->
<script>
const SUPABASE_URL = "https://bjmokvjpitviifjbnlvs.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

const statusText = document.getElementById("status");

async function checkStatus() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/status?select=last_seen&order=id.desc&limit=1`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });

    if (!res.ok) {
      statusText.innerHTML = "❌ HTTP " + res.status;
      console.error("HTTP Error:", res.status);
      return;
    }

    const data = await res.json();

    if (!data || data.length === 0) {
      statusText.innerHTML = "⚠️ NO DATA";
      return;
    }

    const lastUpdate = data[0].last_seen;
    const now = Math.floor(Date.now() / 1000);

    if (now - lastUpdate < 10) {
      statusText.innerHTML = "🟢 ONLINE";
    } else {
      statusText.innerHTML = "🔴 OFFLINE";
    }

  } catch (err) {
    statusText.innerHTML = "❌ ERROR";
    console.error(err);
  }
}

setInterval(checkStatus, 3000);
checkStatus();
</script>
</body>
</html>
